<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Activation Functions</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600&family=Syne:wght@400;600;800&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #1e1e2e;
    --accent: #7c6af7;
    --accent2: #f76a8c;
    --accent3: #6af7c4;
    --accent4: #f7c46a;
    --text: #e0e0f0;
    --muted: #6060a0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    padding: 24px;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: 1.6rem;
    font-weight: 800;
    color: var(--accent);
    margin-bottom: 6px;
    letter-spacing: -0.5px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 0.75rem;
    margin-bottom: 24px;
  }

  .layout {
    display: grid;
    grid-template-columns: 220px 1fr;
    gap: 16px;
    max-width: 1000px;
  }

  /* Sidebar */
  .sidebar {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .era-label {
    font-size: 0.6rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-top: 10px;
    margin-bottom: 2px;
    padding-left: 4px;
  }

  .act-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 8px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    text-align: left;
    transition: all 0.15s;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .act-btn:hover {
    border-color: var(--accent);
    color: var(--text);
  }

  .act-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(124,106,247,0.08);
  }

  .act-btn .year {
    font-size: 0.6rem;
    color: var(--muted);
  }

  /* Main panel */
  .main {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .canvas-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    position: relative;
  }

  canvas {
    display: block;
    width: 100%;
    height: 260px;
  }

  .fn-display {
    font-size: 0.8rem;
    color: var(--accent3);
    margin-top: 10px;
    text-align: center;
  }

  /* Info cards */
  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
  }

  .card-title {
    font-size: 0.6rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 6px;
  }

  .card-content {
    font-size: 0.75rem;
    color: var(--text);
    line-height: 1.6;
  }

  .pro { color: var(--accent3); }
  .con { color: var(--accent2); }

  .gradient-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
  }

  .grad-title {
    font-size: 0.6rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 8px;
  }

  .grad-canvas {
    width: 100%;
    height: 80px;
    display: block;
  }

  .usage-tag {
    display: inline-block;
    background: rgba(124,106,247,0.12);
    border: 1px solid rgba(124,106,247,0.3);
    color: var(--accent);
    font-size: 0.65rem;
    padding: 2px 8px;
    border-radius: 20px;
    margin: 2px;
  }
</style>
</head>
<body>

<h1>Activation Functions</h1>
<p class="subtitle">lịch sử & đặc điểm — click để xem chi tiết</p>

<div class="layout">
  <div class="sidebar" id="sidebar"></div>
  <div class="main">
    <div class="canvas-wrap">
      <canvas id="mainCanvas"></canvas>
      <div class="fn-display" id="fnDisplay"></div>
    </div>
    <div class="gradient-bar">
      <div class="grad-title">Gradient (đạo hàm)</div>
      <canvas class="grad-canvas" id="gradCanvas"></canvas>
    </div>
    <div class="info-grid">
      <div class="card">
        <div class="card-title">Ưu điểm</div>
        <div class="card-content" id="pros"></div>
      </div>
      <div class="card">
        <div class="card-title">Nhược điểm</div>
        <div class="card-content" id="cons"></div>
      </div>
      <div class="card">
        <div class="card-title">Dùng ở đâu</div>
        <div class="card-content" id="usage"></div>
      </div>
      <div class="card">
        <div class="card-title">Lý do ra đời</div>
        <div class="card-content" id="reason"></div>
      </div>
    </div>
  </div>
</div>

<script>
const activations = [
  {
    name: 'Sigmoid', year: '1986',
    era: 'Kỷ nguyên đầu',
    formula: 'σ(x) = 1 / (1 + e⁻ˣ)',
    fn: x => 1 / (1 + Math.exp(-x)),
    grad: x => { const s = 1/(1+Math.exp(-x)); return s*(1-s); },
    color: '#7c6af7',
    range: [-6, 6],
    pros: '• Output ∈ (0,1) → xác suất\n• Smooth, khả vi mọi nơi\n• Nền tảng lý thuyết rõ ràng',
    cons: '• Vanishing gradient: grad_max = 0.25\n• Output không zero-centered\n• exp() tốn tính toán',
    usage: 'Output layer binary classification, gate trong LSTM',
    reason: 'Cần output dạng xác suất. Nền tảng logistic regression.'
  },
  {
    name: 'Tanh', year: '1989',
    era: 'Kỷ nguyên đầu',
    formula: 'tanh(x) = (eˣ - e⁻ˣ) / (eˣ + e⁻ˣ)',
    fn: x => Math.tanh(x),
    grad: x => 1 - Math.tanh(x)**2,
    color: '#f76a8c',
    range: [-4, 4],
    pros: '• Zero-centered → gradient không bias\n• Output ∈ (-1,1)\n• Hội tụ nhanh hơn sigmoid',
    cons: '• Vẫn vanishing gradient\n• Grad_max = 1 tại x=0\n• Bão hòa ở |x| lớn',
    usage: 'Hidden layers RNN, LSTM gates, shallow networks',
    reason: 'Cải thiện sigmoid: zero-centered giúp gradient descent ổn định hơn.'
  },
  {
    name: 'ReLU', year: '2010',
    era: 'Bước ngoặt',
    formula: 'ReLU(x) = max(0, x)',
    fn: x => Math.max(0, x),
    grad: x => x > 0 ? 1 : 0,
    color: '#6af7c4',
    range: [-4, 4],
    pros: '• Không vanishing gradient (x>0)\n• Sparse activation → efficient\n• Tính toán cực nhanh\n• Hội tụ nhanh hơn 6x',
    cons: '• Dying ReLU: neuron chết khi x<0\n• Không zero-centered\n• Không khả vi tại x=0',
    usage: 'CNN, deep networks, default choice 2012–2017',
    reason: 'Hinton et al. 2010: giải quyết vanishing gradient, cho phép train deep network thực sự.'
  },
  {
    name: 'Leaky ReLU', year: '2013',
    era: 'Họ ReLU',
    formula: 'f(x) = x if x>0, else αx (α=0.01)',
    fn: x => x > 0 ? x : 0.01 * x,
    grad: x => x > 0 ? 1 : 0.01,
    color: '#f7c46a',
    range: [-4, 4],
    pros: '• Không dying ReLU\n• Gradient luôn tồn tại\n• Đơn giản, tính toán nhanh',
    cons: '• α là hyperparameter phải tune\n• Không nhất thiết tốt hơn ReLU\n• Không smooth tại x=0',
    usage: 'Thay thế ReLU khi gặp dying neuron problem',
    reason: 'Maas et al. 2013: fix dying ReLU bằng slope nhỏ ở vùng âm.'
  },
  {
    name: 'PReLU', year: '2015',
    era: 'Họ ReLU',
    formula: 'f(x) = x if x>0, else αx (α learned)',
    fn: x => x > 0 ? x : 0.1 * x,
    grad: x => x > 0 ? 1 : 0.1,
    color: '#fa8a4f',
    range: [-4, 4],
    pros: '• α được học từ data\n• Thích nghi với từng layer\n• He et al: vượt human-level ImageNet',
    cons: '• Thêm tham số cần học\n• Risk overfit trên data nhỏ',
    usage: 'Deep CNN (ResNet era), image classification',
    reason: 'He et al. 2015: parametric α → model tự tìm slope tối ưu cho từng task.'
  },
  {
    name: 'ELU', year: '2015',
    era: 'Họ ReLU',
    formula: 'f(x) = x if x≥0, else α(eˣ-1)',
    fn: x => x >= 0 ? x : 1.0 * (Math.exp(x) - 1),
    grad: x => x >= 0 ? 1 : Math.exp(x),
    color: '#c46af7',
    range: [-4, 4],
    pros: '• Smooth tại x=0\n• Output mean gần 0\n• Robust với noise',
    cons: '• Tính exp() tốn hơn ReLU\n• Không cải thiện nhiều so với ReLU trên thực tế',
    usage: 'Deep networks cần smooth gradient, NLP nhất định',
    reason: 'Clevert et al. 2015: smooth + negative values → mean activation gần 0.'
  },
  {
    name: 'SELU', year: '2017',
    era: 'Họ ReLU',
    formula: 'SELU(x) = λ·ELU(x, α)',
    fn: x => {
      const alpha = 1.6732632423543772, scale = 1.0507009873554805;
      return scale * (x >= 0 ? x : alpha * (Math.exp(x) - 1));
    },
    grad: x => {
      const alpha = 1.6732632423543772, scale = 1.0507009873554805;
      return scale * (x >= 0 ? 1 : alpha * Math.exp(x));
    },
    color: '#6a9ef7',
    range: [-4, 4],
    pros: '• Self-normalizing: mean→0, var→1\n• Không cần BatchNorm\n• Lý thuyết toán học chặt chẽ',
    cons: '• Chỉ hoạt động với lecun_normal init\n• Fragile với dropout thường\n• Ít dùng thực tế',
    usage: 'Deep feedforward networks, thay thế BatchNorm',
    reason: 'Klambauer et al. 2017: tìm α,λ cố định sao cho distribution tự normalize.'
  },
  {
    name: 'Swish', year: '2017',
    era: 'Neural search',
    formula: 'Swish(x) = x · σ(x)',
    fn: x => x / (1 + Math.exp(-x)),
    grad: x => {
      const s = 1/(1+Math.exp(-x));
      return s + x*s*(1-s);
    },
    color: '#f76ab0',
    range: [-6, 4],
    pros: '• Smooth, non-monotonic\n• Unbounded trên (không saturate)\n• NAS tìm ra → tối ưu thực nghiệm\n• Tốt hơn ReLU trên deep networks',
    cons: '• Tính toán phức tạp hơn ReLU\n• Lợi ích nhỏ với shallow nets',
    usage: 'EfficientNet, MobileNet, nhiều SOTA models',
    reason: 'Ramachandran et al. (Google Brain) 2017: dùng Neural Architecture Search tìm activation tốt nhất.'
  },
  {
    name: 'GELU', year: '2016',
    era: 'Transformer era',
    formula: 'GELU(x) ≈ x · Φ(x)',
    fn: x => 0.5 * x * (1 + Math.tanh(Math.sqrt(2/Math.PI) * (x + 0.044715 * x**3))),
    grad: x => {
      const t = Math.tanh(Math.sqrt(2/Math.PI) * (x + 0.044715*x**3));
      const dt = (1-t*t) * Math.sqrt(2/Math.PI) * (1 + 3*0.044715*x**2);
      return 0.5*(1+t) + 0.5*x*dt;
    },
    color: '#4ff7a0',
    range: [-4, 4],
    pros: '• Smooth, differentiable everywhere\n• Probabilistic interpretation\n• Tốt nhất cho Transformer\n• Kết hợp dropout + ReLU',
    cons: '• Tính toán nặng hơn ReLU\n• Không có lợi thế rõ trên CNN',
    usage: 'GPT, BERT, ViT — toàn bộ Transformer family',
    reason: 'Hendrycks 2016: GELU = x * P(X≤x) — weight input theo xác suất nó là dương.'
  },
  {
    name: 'SiLU / Mish', year: '2019',
    era: 'Transformer era',
    formula: 'Mish(x) = x · tanh(ln(1+eˣ))',
    fn: x => x * Math.tanh(Math.log(1 + Math.exp(x))),
    grad: x => {
      const sp = Math.log(1+Math.exp(x));
      const t = Math.tanh(sp);
      const st = 1/(1+Math.exp(-x));
      return t + x * st * (1-t*t);
    },
    color: '#f7e46a',
    range: [-4, 4],
    pros: '• Smooth, non-monotonic\n• Self-regularizing\n• Tốt hơn Swish/ReLU trên object detection',
    cons: '• Tính toán nặng nhất\n• Lợi ích nhỏ so với GELU/Swish',
    usage: 'YOLOv4, một số vision models',
    reason: 'Misra 2019: smooth bounded dưới, unbounded trên — tránh cả dying ReLU lẫn saturation.'
  },
  {
    name: 'GLU / SwiGLU', year: '2022',
    era: 'LLM era',
    formula: 'SwiGLU(x,W,V) = Swish(xW) ⊙ xV',
    fn: x => {
      // Simplified: SwiGLU với linear gate = x
      const swish = x / (1 + Math.exp(-x));
      return swish * (x * 0.7 + 0.3); // approximation for viz
    },
    grad: x => {
      const s = 1/(1+Math.exp(-x));
      const dswish = s + x*s*(1-s);
      return dswish * (x*0.7+0.3) + (x/(1+Math.exp(-x))) * 0.7;
    },
    color: '#ff6b6b',
    range: [-4, 4],
    pros: '• Gating mechanism: chọn lọc thông tin\n• Tốt nhất cho LLM hiện tại\n• Tăng capacity không tăng depth',
    cons: '• Cần 2 linear projections → 1.5x params\n• Phức tạp hơn nhiều',
    usage: 'LLaMA, PaLM, Mistral — hầu hết LLM hiện đại',
    reason: 'Noam Shazeer 2020: gating cho phép model học "chọn" feature nào quan trọng.'
  },
];

const eras = [...new Set(activations.map(a => a.era))];
let selected = 0;

function buildSidebar() {
  const sb = document.getElementById('sidebar');
  let currentEra = '';
  activations.forEach((a, i) => {
    if (a.era !== currentEra) {
      currentEra = a.era;
      const lbl = document.createElement('div');
      lbl.className = 'era-label';
      lbl.textContent = a.era;
      sb.appendChild(lbl);
    }
    const btn = document.createElement('button');
    btn.className = 'act-btn' + (i === 0 ? ' active' : '');
    btn.innerHTML = `<span>${a.name}</span><span class="year">${a.year}</span>`;
    btn.onclick = () => select(i);
    btn.id = `btn-${i}`;
    sb.appendChild(btn);
  });
}

function select(i) {
  selected = i;
  document.querySelectorAll('.act-btn').forEach((b,j) => b.classList.toggle('active', j===i));
  draw();
  updateInfo();
}

function getCanvasSize(canvas) {
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * window.devicePixelRatio;
  canvas.height = rect.height * window.devicePixelRatio;
  return { w: canvas.width, h: canvas.height, dpr: window.devicePixelRatio };
}

function draw() {
  const a = activations[selected];
  const canvas = document.getElementById('mainCanvas');
  const { w, h, dpr } = getCanvasSize(canvas);
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, w, h);

  const [xMin, xMax] = a.range;
  const yPad = 0.2;
  
  // Compute y range
  let yMin = Infinity, yMax = -Infinity;
  for (let i = 0; i <= 200; i++) {
    const x = xMin + (xMax - xMin) * i / 200;
    const y = a.fn(x);
    if (isFinite(y)) { yMin = Math.min(yMin, y); yMax = Math.max(yMax, y); }
  }
  const yRange = yMax - yMin;
  yMin -= yRange * yPad; yMax += yRange * yPad;

  const toCanvas = (x, y) => ({
    cx: (x - xMin) / (xMax - xMin) * w,
    cy: h - (y - yMin) / (yMax - yMin) * h
  });

  // Grid
  ctx.strokeStyle = 'rgba(255,255,255,0.05)';
  ctx.lineWidth = 1 * dpr;
  for (let x = Math.ceil(xMin); x <= xMax; x++) {
    const {cx} = toCanvas(x, 0);
    ctx.beginPath(); ctx.moveTo(cx, 0); ctx.lineTo(cx, h); ctx.stroke();
  }
  for (let y = Math.round(yMin); y <= yMax; y += 0.5) {
    const {cy} = toCanvas(0, y);
    ctx.beginPath(); ctx.moveTo(0, cy); ctx.lineTo(w, cy); ctx.stroke();
  }

  // Axes
  ctx.strokeStyle = 'rgba(255,255,255,0.2)';
  ctx.lineWidth = 1.5 * dpr;
  const {cy: cy0} = toCanvas(0, 0);
  const {cx: cx0} = toCanvas(0, 0);
  ctx.beginPath(); ctx.moveTo(0, cy0); ctx.lineTo(w, cy0); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx0, 0); ctx.lineTo(cx0, h); ctx.stroke();

  // Axis labels
  ctx.fillStyle = 'rgba(150,150,200,0.6)';
  ctx.font = `${10*dpr}px JetBrains Mono`;
  for (let x = Math.ceil(xMin); x <= xMax; x++) {
    if (x === 0) continue;
    const {cx, cy} = toCanvas(x, 0);
    ctx.fillText(x, cx - 6*dpr, cy + 14*dpr);
  }

  // Function curve
  ctx.strokeStyle = a.color;
  ctx.lineWidth = 2.5 * dpr;
  ctx.shadowColor = a.color;
  ctx.shadowBlur = 8 * dpr;
  ctx.beginPath();
  let first = true;
  for (let i = 0; i <= 400; i++) {
    const x = xMin + (xMax - xMin) * i / 400;
    const y = a.fn(x);
    if (!isFinite(y)) { first = true; continue; }
    const {cx, cy} = toCanvas(x, y);
    if (first) { ctx.moveTo(cx, cy); first = false; }
    else ctx.lineTo(cx, cy);
  }
  ctx.stroke();
  ctx.shadowBlur = 0;

  document.getElementById('fnDisplay').textContent = a.formula;
}

function drawGrad() {
  const a = activations[selected];
  const canvas = document.getElementById('gradCanvas');
  const { w, h, dpr } = getCanvasSize(canvas);
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, w, h);

  const [xMin, xMax] = a.range;
  let gMin = 0, gMax = -Infinity;
  for (let i = 0; i <= 200; i++) {
    const x = xMin + (xMax-xMin)*i/200;
    const g = a.grad(x);
    if (isFinite(g)) { gMin = Math.min(gMin, g); gMax = Math.max(gMax, g); }
  }
  gMax = Math.max(gMax, 0.1);
  const pad = (gMax - gMin) * 0.15;
  gMin -= pad; gMax += pad;

  const toC = (x, y) => ({
    cx: (x-xMin)/(xMax-xMin)*w,
    cy: h - (y-gMin)/(gMax-gMin)*h
  });

  // Zero line
  const {cy: cy0} = toC(0, 0);
  ctx.strokeStyle = 'rgba(255,255,255,0.1)';
  ctx.lineWidth = 1*dpr;
  ctx.beginPath(); ctx.moveTo(0,cy0); ctx.lineTo(w,cy0); ctx.stroke();

  // Fill under curve
  ctx.beginPath();
  let first = true;
  const pts = [];
  for (let i = 0; i <= 300; i++) {
    const x = xMin + (xMax-xMin)*i/300;
    const g = a.grad(x);
    if (!isFinite(g)) { first = true; continue; }
    const {cx, cy} = toC(x, g);
    pts.push({cx, cy, x});
    if (first) { ctx.moveTo(cx, cy); first = false; }
    else ctx.lineTo(cx, cy);
  }
  if (pts.length > 0) {
    ctx.lineTo(pts[pts.length-1].cx, cy0);
    ctx.lineTo(pts[0].cx, cy0);
    ctx.closePath();
    const grad = ctx.createLinearGradient(0, 0, 0, h);
    grad.addColorStop(0, a.color + '44');
    grad.addColorStop(1, a.color + '08');
    ctx.fillStyle = grad;
    ctx.fill();
  }

  // Gradient line
  ctx.strokeStyle = a.color;
  ctx.lineWidth = 2*dpr;
  ctx.shadowColor = a.color;
  ctx.shadowBlur = 6*dpr;
  ctx.beginPath();
  first = true;
  for (let i = 0; i <= 300; i++) {
    const x = xMin + (xMax-xMin)*i/300;
    const g = a.grad(x);
    if (!isFinite(g)) { first = true; continue; }
    const {cx, cy} = toC(x, g);
    if (first) { ctx.moveTo(cx,cy); first = false; }
    else ctx.lineTo(cx,cy);
  }
  ctx.stroke();
  ctx.shadowBlur = 0;
}

function updateInfo() {
  const a = activations[selected];
  document.getElementById('pros').innerHTML = a.pros.split('\n').map(l => `<div class="pro">${l}</div>`).join('');
  document.getElementById('cons').innerHTML = a.cons.split('\n').map(l => `<div class="con">${l}</div>`).join('');
  document.getElementById('usage').textContent = a.usage;
  document.getElementById('reason').textContent = a.reason;
  drawGrad();
}

buildSidebar();
draw();
updateInfo();

window.addEventListener('resize', () => { draw(); drawGrad(); });
</script>
</body>
</html>
